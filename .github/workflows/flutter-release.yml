name: Flutter Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk-version: 3.11.5

      - name: Install Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          version: 3.41.9

      - run: flutter pub get
        working-directory: flutter_app

      - run: flutter analyze
        working-directory: flutter_app

      - run: flutter test
        working-directory: flutter_app

  build:
    needs: analyze-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: flutter_app_windows_x64
            build_cmd: flutter build windows --release
            artifact_path: flutter_app/build/windows/x64/runner/Release/flutter_app.exe
          - os: macos-latest
            artifact_name: flutter_app_macos
            build_cmd: flutter build macos --release
            artifact_path: flutter_app/build/macos/Build/Products/Release/flutter_app.app
          - os: ubuntu-latest
            artifact_name: flutter_app_linux
            build_cmd: flutter build linux --release
            artifact_path: flutter_app/build/linux/x64/release/bundle/
          - os: macos-latest
            artifact_name: flutter_app_ios
            build_cmd: flutter build ios --release --no-codesign
            artifact_path: flutter_app/build/ios/iphone/Build/Products/Release-iphoneos/Runner.app
          - os: ubuntu-latest
            artifact_name: flutter_app_android
            build_cmd: flutter build apk --release
            artifact_path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk-version: 3.11.5

      - name: Install Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          version: 3.41.9

      - run: flutter pub get
        working-directory: flutter_app

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsecret-1-dev keybinder-3.0 libayatana-appindicator3-dev
        working-directory: flutter_app

      - name: Build ${{ matrix.artifact_name }}
        run: ${{ matrix.build_cmd }}
        working-directory: flutter_app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Parse version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' flutter_app/pubspec.yaml | sed 's/version: //')
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: v$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Flutter App v${{ steps.version.outputs.value }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            artifacts/flutter_app_windows_x64/**
            artifacts/flutter_app_macos/**
            artifacts/flutter_app_linux/**
            artifacts/flutter_app_ios/**
            artifacts/flutter_app_android/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}