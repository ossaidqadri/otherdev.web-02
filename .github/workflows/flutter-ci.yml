name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-ci.yml'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk-version: 3.11.5

      - name: Install Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          version: 3.41.9

      - run: flutter pub get
        working-directory: flutter_app

      - run: flutter analyze
        working-directory: flutter_app

      - run: flutter test
        working-directory: flutter_app

  build:
    needs: analyze-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: flutter_app_windows_x64
            build_cmd: flutter build windows --release
            artifact_path: flutter_app/build/windows/x64/runner/Release/flutter_app.exe
          - os: macos-latest
            artifact_name: flutter_app_macos
            build_cmd: flutter build macos --release
            artifact_path: flutter_app/build/macos/Build/Products/Release/flutter_app.app
          - os: ubuntu-latest
            artifact_name: flutter_app_linux
            build_cmd: flutter build linux --release
            artifact_path: flutter_app/build/linux/x64/release/bundle/

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk-version: 3.11.5

      - name: Install Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          version: 3.41.9

      - run: flutter pub get
        working-directory: flutter_app

      - name: Build ${{ matrix.artifact_name }}
        run: ${{ matrix.build_cmd }}
        working-directory: flutter_app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 5