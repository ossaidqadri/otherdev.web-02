name: flutter_app
description: "otherdev - native Flutter app for iOS, Android, macOS, Windows, Linux."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management — Riverpod 3 with code-gen
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0

  # Routing
  go_router: ^14.0.0

  # HTTP client
  dio: ^5.5.0
  http: ^1.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.0

  # JSON serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.0

  # Connectivity
  connectivity_plus: ^6.0.0

  # Desktop window management
  window_manager: ^0.4.0

  # System tray
  tray_manager: ^0.2.3

  # Global keyboard shortcuts
  hotkey_manager: ^0.2.3

  # Path provider for window state storage
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^3.0.0
  freezed: ^3.0.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/